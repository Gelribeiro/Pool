<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pool Liquidity</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#000;
color:white;
text-align:center;
}

/* HERO */

.hero{
background:url('Pool1.jpg') center/cover no-repeat;
height:100vh;
display:flex;
flex-direction:column;
justify-content:flex-end;
align-items:center;
padding:40px 20px;
}

/* BOTÃO */

.cta{
margin-bottom:40px;
}

.cta a{
display:inline-block;
padding:18px 40px;
font-size:20px;
font-weight:bold;
color:white;
text-decoration:none;
border-radius:40px;

background:linear-gradient(90deg,#7a00ff,#ff00aa);

box-shadow:0 0 20px rgba(255,0,200,0.8);

animation:pulse 1.5s infinite;
}

/* EFEITO PULSANTE */

@keyframes pulse{

0%{
transform:scale(1);
box-shadow:0 0 15px #ff00aa;
}

50%{
transform:scale(1.07);
box-shadow:0 0 35px #ff00aa;
}

100%{
transform:scale(1);
box-shadow:0 0 15px #ff00aa;
}

}

/* SEÇÃO CONTADOR */

.countdown{

background:#050505;
padding:50px 20px;

}

.timer{

font-size:38px;
margin-bottom:10px;
letter-spacing:2px;

}

.texto{

font-size:18px;
color:#ff2bbf;

}

</style>
</head>

<body>

<section class="hero">

<div class="cta">
<a href="https://chat.whatsapp.com/EmHwSglTZ3tADQP0xiKKFr">
🔥 GARANTIR ACESSO ANTECIPADO
</a>
</div>

</section>

<section class="countdown">

<div class="timer" id="timer">
25d 05h 16m 00s
</div>

<div class="texto">
Restam apenas 300 vagas na whitelist
</div>

</section>

</body>
</html>
