 <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POOLIQ - Pré Lançamento</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0a0a0f;
    color: white;
    text-align: center;
}

.hero {
    background: url('Flyerpool.png') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 120px;
}

.cta-button {
    background: linear-gradient(90deg, #7b00ff, #ff00c8);
    border: none;
    padding: 15px 40px;
    font-size: 18px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.escassez {
    background: #111;
    padding: 40px 20px;
}

.timer {
    font-size: 32px;
    margin-bottom: 10px;
}

.vagas {
    font-size: 20px;
    color: #ff00c8;
}
</style>
</head>

<body>

<div class="hero">
<a href="https://chat.whatsapp.com/EmHwSglTZ3tADQP0xiKKFr" target="_blank">
<button class="cta-button">QUERO ACESSO ANTECIPADO</button>
</a>
</div>

<div class="escassez">
<div class="timer" id="countdown"></div>
<div class="vagas">Restam apenas <span id="spots">300</span> vagas na whitelist</div>
</div>

<script>
var countDownDate = new Date("Mar 30, 2026 23:59:59").getTime();

var x = setInterval(function() {

var now = new Date().getTime();
var distance = countDownDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("countdown").innerHTML =
days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

if (distance < 0) {
clearInterval(x);
document.getElementById("countdown").innerHTML = "Lançamento Encerrado";
}

}, 1000);
</script>

</body>
</html>
